<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ironmlx Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <nav class="w-52 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col min-h-screen">
    <div class="p-4 text-xl font-bold text-blue-500">🚀 ironmlx</div>

    <div class="flex-1 px-2 space-y-1">
      <template x-for="page in pages" :key="page.id">
        <button
          @click="currentPage = page.id"
          :class="currentPage === page.id
            ? 'bg-blue-600 text-white'
            : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700'"
          class="w-full text-left px-3 py-2 rounded-lg text-sm transition"
          x-text="page.icon + ' ' + $t('nav.' + page.id)">
        </button>
      </template>
    </div>

    <div class="p-3 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-500 space-y-2">
      <button @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light')"
              class="hover:text-gray-300 transition">
        <span x-text="darkMode ? '☀️ ' + $t('theme.light') : '🌙 ' + $t('theme.dark')"></span>
      </button>
      <div>
        <select x-model="lang" @change="localStorage.setItem('lang', lang)"
                class="bg-transparent border border-gray-600 rounded px-1 py-0.5 text-xs">
          <option value="en">EN</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1 p-6 overflow-auto">
    <!-- Status Page -->
    <div x-show="currentPage === 'status'" x-cloak>
      <h2 class="text-2xl font-bold mb-1" x-text="$t('status.title')"></h2>
      <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm" x-text="$t('status.subtitle')"></p>

      <!-- Status cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <!-- Status -->
        <div class="admin-card">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('nav.status')"></div>
          <div class="text-xl font-bold" :class="health.status === 'ok' ? 'text-green-500' : 'text-red-500'">
            <span class="status-dot" :class="health.status === 'ok' ? 'running' : 'stopped'"></span>
            <span x-text="health.status === 'ok' ? $t('status.running') : $t('status.stopped')"></span>
          </div>
        </div>
        <!-- Active Memory -->
        <div class="admin-card">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('status.active_memory')"></div>
          <div class="text-xl font-bold" x-text="health.memory ? health.memory.active_mb.toFixed(0) + ' MB' : '—'"></div>
        </div>
        <!-- Peak Memory -->
        <div class="admin-card">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('status.peak_memory')"></div>
          <div class="text-xl font-bold" x-text="health.memory ? health.memory.peak_mb.toFixed(0) + ' MB' : '—'"></div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Default Model -->
        <div class="admin-card">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('status.default_model')"></div>
          <div class="text-sm text-blue-400" x-text="health.model || '—'"></div>
        </div>
        <!-- Uptime -->
        <div class="admin-card">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('status.uptime')"></div>
          <div class="text-sm" x-text="uptime"></div>
        </div>
        <!-- Loaded Models -->
        <div class="admin-card">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('status.loaded_models')"></div>
          <div class="text-xl font-bold" x-text="models.length"></div>
        </div>
      </div>
    </div>

    <!-- Models Page -->
    <div x-show="currentPage === 'models'" x-cloak>
      <h2 class="text-2xl font-bold mb-1" x-text="$t('models.title')"></h2>
      <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm" x-text="$t('models.subtitle')"></p>

      <!-- Load model form -->
      <div class="admin-card mb-4">
        <div class="flex gap-2">
          <input x-model="loadModelPath" :placeholder="$t('models.load_placeholder')"
                 class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
          <button @click="loadModel()" class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700"
                  x-text="$t('models.load_button')"></button>
        </div>
        <div x-show="loadModelMsg" class="mt-2 text-sm" :class="loadModelError ? 'text-red-400' : 'text-green-400'" x-text="loadModelMsg"></div>
      </div>

      <!-- Model list -->
      <div class="space-y-2">
        <template x-for="m in models" :key="m.id">
          <div class="admin-card flex items-center justify-between">
            <div>
              <span class="font-medium" x-text="m.id"></span>
              <span x-show="m.id === health.model" class="ml-2 text-xs bg-blue-600 text-white px-2 py-0.5 rounded">default</span>
            </div>
            <div class="flex gap-2">
              <button x-show="m.id !== health.model" @click="setDefaultModel(m.id)"
                      class="text-xs px-2 py-1 border border-gray-600 rounded hover:bg-gray-700"
                      x-text="$t('models.set_default')"></button>
              <button @click="unloadModel(m.id)"
                      class="text-xs px-2 py-1 border border-red-600 text-red-400 rounded hover:bg-red-900"
                      x-text="$t('models.unload')"></button>
            </div>
          </div>
        </template>
        <div x-show="models.length === 0" class="text-gray-500 text-sm" x-text="$t('models.no_models')"></div>
      </div>

      <!-- HuggingFace Search -->
      <h3 class="text-lg font-semibold mt-8 mb-3" x-text="$t('models.hf_search_title')"></h3>
      <div class="admin-card mb-4">
        <div class="flex gap-2">
          <input x-model="hfSearchQuery" :placeholder="$t('models.hf_search_placeholder')"
                 @keydown.enter="hfSearch()"
                 class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
          <button @click="hfSearch()" :disabled="hfSearching"
                  class="px-4 py-2 bg-purple-600 text-white rounded text-sm hover:bg-purple-700 disabled:opacity-50"
                  x-text="hfSearching ? $t('models.hf_searching') : $t('models.hf_search_button')"></button>
        </div>
      </div>

      <!-- Search Results -->
      <div x-show="hfSearchResults.length > 0" class="space-y-2 mb-6">
        <template x-for="result in hfSearchResults" :key="result.id">
          <div class="admin-card flex items-center justify-between">
            <div>
              <span class="font-medium text-purple-400" x-text="result.id"></span>
              <span class="ml-3 text-xs text-gray-500" x-text="result.downloads.toLocaleString() + ' downloads'"></span>
            </div>
            <button @click="hfDownload(result.id)" :disabled="isDownloading(result.id)"
                    class="text-xs px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 disabled:opacity-50"
                    x-text="isDownloading(result.id) ? $t('models.hf_downloading') : $t('models.hf_download')"></button>
          </div>
        </template>
      </div>

      <!-- Active Downloads -->
      <div x-show="hfDownloads.length > 0">
        <h3 class="text-lg font-semibold mb-3" x-text="$t('models.hf_downloads_title')"></h3>
        <div class="space-y-2">
          <template x-for="dl in hfDownloads" :key="dl.repo_id">
            <div class="admin-card">
              <div class="flex items-center justify-between mb-2">
                <span class="font-medium text-sm" x-text="dl.repo_id"></span>
                <span class="text-xs" :class="hfDownloadStatusColor(dl.status)"
                      x-text="dl.status === 'downloading' ? Math.round(dl.progress_pct) + '%' : dl.status"></span>
              </div>
              <div x-show="dl.status === 'downloading'" class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-2">
                <div class="bg-blue-500 h-2 rounded-full transition-all duration-300"
                     :style="'width: ' + dl.progress_pct + '%'"></div>
              </div>
              <div x-show="dl.error" class="text-xs text-red-400 mt-1" x-text="dl.error"></div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Settings Page -->
    <div x-show="currentPage === 'settings'" x-cloak>
      <h2 class="text-2xl font-bold mb-1" x-text="$t('settings.title')"></h2>
      <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm" x-text="$t('settings.subtitle')"></p>

      <div class="max-w-2xl space-y-4">
        <!-- Host (readonly) -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Host</label>
          <input type="text" :value="settings.host" readonly
                 class="w-full px-3 py-2 bg-gray-200 dark:bg-gray-600 rounded text-sm cursor-not-allowed">
        </div>

        <!-- Port (readonly) -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Port</label>
          <input type="number" :value="settings.port" readonly
                 class="w-full px-3 py-2 bg-gray-200 dark:bg-gray-600 rounded text-sm cursor-not-allowed">
        </div>

        <!-- Memory Limit -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Memory Limit (GB)</label>
          <input type="number" x-model.number="settings.memory_limit_gb" step="0.1" min="0"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
        </div>

        <!-- Cache Max Size -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Cache Max Size (GB)</label>
          <input type="number" x-model.number="settings.cache_max_size_gb" step="0.1" min="0"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
        </div>

        <!-- Max Concurrent Sequences -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Max Concurrent Sequences</label>
          <input type="number" x-model.number="settings.max_num_seqs" step="1" min="1"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
        </div>

        <!-- Temperature -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Temperature</label>
          <input type="number" x-model.number="settings.temperature" step="0.1" min="0" max="2"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
        </div>

        <!-- Top-P -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Top-P</label>
          <input type="number" x-model.number="settings.top_p" step="0.05" min="0" max="1"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
        </div>

        <!-- Log Level -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">Log Level</label>
          <select x-model="settings.log_level"
                  class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
            <option value="trace">trace</option>
            <option value="debug">debug</option>
            <option value="info">info</option>
            <option value="warn">warn</option>
            <option value="error">error</option>
          </select>
        </div>

        <!-- HuggingFace Endpoint -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1" x-text="$t('settings.hf_endpoint')"></label>
          <input type="text" x-model="settings.hf_endpoint"
                 placeholder="https://huggingface.co"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
          <div class="text-xs text-gray-500 mt-1" x-text="$t('settings.hf_endpoint_hint')"></div>
        </div>

        <!-- Log Buffer Size -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1" x-text="$t('settings.log_buffer_size')"></label>
          <input type="number" x-model.number="settings.log_buffer_size" step="1" min="10" max="10000"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
        </div>

        <!-- Chat Template Override -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1" x-text="$t('settings.chat_template')"></label>
          <textarea x-model="settings.chat_template_override" rows="4"
                    :placeholder="$t('settings.chat_template_placeholder')"
                    class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm font-mono resize-y"></textarea>
        </div>

        <!-- Model Aliases -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-2" x-text="$t('settings.model_aliases')"></label>
          <div class="space-y-2 mb-3">
            <template x-for="(realId, alias) in settings.model_aliases" :key="alias">
              <div class="flex gap-2 items-center">
                <span class="text-sm font-mono bg-gray-200 dark:bg-gray-600 px-2 py-1 rounded" x-text="alias"></span>
                <span class="text-gray-500 text-xs">&rarr;</span>
                <span class="text-sm font-mono text-blue-400" x-text="realId"></span>
                <button @click="removeAlias(alias)" class="text-red-400 hover:text-red-300 text-xs ml-auto">x</button>
              </div>
            </template>
            <div x-show="Object.keys(settings.model_aliases || {}).length === 0" class="text-gray-500 text-xs"
                 x-text="$t('settings.no_aliases')"></div>
          </div>
          <div class="flex gap-2">
            <input x-model="newAliasName" :placeholder="$t('settings.alias_name')"
                   class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm">
            <input x-model="newAliasTarget" :placeholder="$t('settings.alias_target')"
                   class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm">
            <button @click="addAlias()" class="px-3 py-1 bg-blue-600 text-white rounded text-xs hover:bg-blue-700"
                    x-text="$t('settings.add_alias')"></button>
          </div>
        </div>

        <!-- API Key -->
        <div class="admin-card">
          <label class="block text-xs text-gray-500 mb-1">API Key</label>
          <input type="password" x-model="settings.api_key" placeholder="Leave empty to disable auth"
                 class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm">
          <div x-show="settings.api_key_set" class="text-xs text-green-500 mt-1">API key is currently set</div>
        </div>

        <!-- Save -->
        <div class="flex items-center gap-3">
          <button @click="saveSettings()"
                  class="px-6 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 transition"
                  x-text="$t('settings.save')"></button>
          <span x-show="settingsMsg" class="text-sm" :class="settingsError ? 'text-red-400' : 'text-green-400'"
                x-text="settingsMsg"></span>
        </div>
      </div>
    </div>

    <!-- Logs Page -->
    <div x-show="currentPage === 'logs'" x-cloak>
      <h2 class="text-2xl font-bold mb-1" x-text="$t('logs.title')"></h2>
      <p class="text-gray-500 dark:text-gray-400 mb-4 text-sm" x-text="$t('logs.subtitle')"></p>

      <div class="flex gap-2 mb-4">
        <select x-model="logLevel" class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm">
          <option value="all" x-text="$t('logs.all_levels')"></option>
          <option value="info">Info</option>
          <option value="warn">Warning</option>
          <option value="error">Error</option>
        </select>
        <button @click="clearLogs()" class="px-3 py-1 text-sm border border-gray-600 rounded hover:bg-gray-700"
                x-text="$t('logs.clear')"></button>
      </div>

      <div class="admin-card font-mono text-xs space-y-1 max-h-[calc(100vh-14rem)] overflow-y-auto" x-ref="logContainer">
        <template x-for="(log, idx) in filteredLogs" :key="idx">
          <div class="flex gap-2 py-0.5 border-b border-gray-100 dark:border-gray-700">
            <span class="text-gray-500 shrink-0" x-text="new Date(log.timestamp * 1000).toLocaleTimeString()"></span>
            <span class="shrink-0 w-12"
                  :class="{
                    'text-red-400': log.level === 'error',
                    'text-yellow-400': log.level === 'warn',
                    'text-blue-400': log.level === 'info',
                    'text-gray-500': log.level === 'debug'
                  }"
                  x-text="log.level.toUpperCase()"></span>
            <span x-text="log.message"></span>
          </div>
        </template>
        <div x-show="filteredLogs.length === 0" class="text-gray-500" x-text="$t('logs.no_entries')"></div>
      </div>
    </div>

    <!-- Benchmark Page -->
    <div x-show="currentPage === 'benchmark'" x-cloak>
      <h2 class="text-2xl font-bold mb-1" x-text="$t('benchmark.title')"></h2>
      <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm" x-text="$t('benchmark.subtitle')"></p>

      <div class="admin-card mb-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="text-xs text-gray-500 block mb-1">Model</label>
            <select x-model="benchModel" class="w-full px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm">
              <template x-for="m in models" :key="m.id">
                <option :value="m.id" x-text="m.id"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Max Tokens</label>
            <input type="number" x-model.number="benchTokens" class="w-full px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm">
          </div>
          <div class="flex items-end">
            <button @click="runBenchmark()" :disabled="benchRunning"
                    class="px-4 py-1 bg-green-600 text-white rounded text-sm hover:bg-green-700 disabled:opacity-50">
              <span x-text="benchRunning ? $t('benchmark.running') : $t('benchmark.run')"></span>
            </button>
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Prompt</label>
          <textarea x-model="benchPrompt" rows="2" class="w-full px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm resize-none"></textarea>
        </div>
      </div>

      <div x-show="benchResult" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="admin-card text-center">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('benchmark.ttft')"></div>
          <div class="text-xl font-bold" x-text="benchResult ? benchResult.ttft_ms.toFixed(0) + ' ms' : '—'"></div>
        </div>
        <div class="admin-card text-center">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('benchmark.throughput')"></div>
          <div class="text-xl font-bold" x-text="benchResult ? benchResult.tokens_per_sec.toFixed(1) + ' tok/s' : '—'"></div>
        </div>
        <div class="admin-card text-center">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('benchmark.total_time')"></div>
          <div class="text-xl font-bold" x-text="benchResult ? (benchResult.total_ms / 1000).toFixed(1) + ' s' : '—'"></div>
        </div>
        <div class="admin-card text-center">
          <div class="text-xs text-gray-500 mb-1" x-text="$t('benchmark.generated')"></div>
          <div class="text-xl font-bold" x-text="benchResult ? benchResult.generated_tokens + ' tok' : '—'"></div>
        </div>
      </div>

      <!-- Benchmark History -->
      <div class="mt-6">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-lg font-semibold" x-text="$t('benchmark.history')"></h3>
          <button x-show="benchHistory.length > 0" @click="clearBenchHistory()"
                  class="px-3 py-1 text-xs border border-gray-600 rounded hover:bg-gray-700"
                  x-text="$t('benchmark.clear_history')"></button>
        </div>
        <div x-show="benchHistory.length > 0" class="admin-card overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-xs text-gray-500 border-b border-gray-200 dark:border-gray-700">
                <th class="pb-2 pr-4" x-text="$t('benchmark.hist_time')"></th>
                <th class="pb-2 pr-4">Model</th>
                <th class="pb-2 pr-4" x-text="$t('benchmark.hist_prompt')"></th>
                <th class="pb-2 pr-4" x-text="$t('benchmark.hist_gen')"></th>
                <th class="pb-2 pr-4" x-text="$t('benchmark.ttft')"></th>
                <th class="pb-2 pr-4" x-text="$t('benchmark.throughput')"></th>
                <th class="pb-2" x-text="$t('benchmark.total_time')"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(h, idx) in benchHistory" :key="idx">
                <tr class="border-b border-gray-100 dark:border-gray-700">
                  <td class="py-1 pr-4 text-xs text-gray-500" x-text="new Date(h.timestamp * 1000).toLocaleString()"></td>
                  <td class="py-1 pr-4 font-mono text-xs" x-text="h.model"></td>
                  <td class="py-1 pr-4" x-text="h.prompt_tokens"></td>
                  <td class="py-1 pr-4" x-text="h.gen_tokens"></td>
                  <td class="py-1 pr-4" x-text="h.ttft_ms.toFixed(0) + ' ms'"></td>
                  <td class="py-1 pr-4" x-text="h.tok_per_sec.toFixed(1) + ' tok/s'"></td>
                  <td class="py-1" x-text="(h.total_ms / 1000).toFixed(1) + ' s'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div x-show="benchHistory.length === 0" class="text-gray-500 text-sm" x-text="$t('benchmark.no_history')"></div>
      </div>
    </div>

    <!-- Chat Page -->
    <div x-show="currentPage === 'chat'" x-cloak>
      <div class="flex flex-col h-[calc(100vh-3rem)]">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-2xl font-bold" x-text="$t('chat.title')"></h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="$t('chat.subtitle')"></p>
          </div>
          <div class="flex gap-2 items-center">
            <select x-model="chatModel" class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm">
              <template x-for="m in models" :key="m.id">
                <option :value="m.id" x-text="m.id"></option>
              </template>
            </select>
            <button @click="clearChat()" class="px-3 py-1 text-sm border border-gray-600 rounded hover:bg-gray-700"
                    x-text="$t('chat.clear')"></button>
          </div>
        </div>

        <!-- Messages -->
        <div class="flex-1 overflow-y-auto space-y-4 mb-4" x-ref="chatMessages">
          <template x-for="(msg, idx) in chatMessages" :key="idx">
            <div class="flex gap-3" :class="msg.role === 'user' ? 'justify-end' : ''">
              <div :class="msg.role === 'user'
                ? 'bg-blue-600 text-white rounded-lg px-4 py-2 max-w-[70%]'
                : 'bg-gray-200 dark:bg-gray-700 rounded-lg px-4 py-2 max-w-[70%] chat-prose'"
                x-html="msg.role === 'user' ? escapeHtml(msg.content) : renderMarkdown(msg.content)">
              </div>
            </div>
          </template>
          <div x-show="chatStreaming" class="flex gap-3">
            <div class="bg-gray-200 dark:bg-gray-700 rounded-lg px-4 py-2 max-w-[70%] chat-prose"
                 x-html="renderMarkdown(chatStreamContent)">
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="flex gap-2">
          <textarea x-model="chatInput" @keydown.enter.prevent="if (!$event.shiftKey) sendChat()"
                    :placeholder="$t('chat.placeholder')"
                    rows="2"
                    class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded text-sm resize-none"></textarea>
          <button @click="sendChat()" :disabled="chatStreaming || !chatInput.trim()"
                  class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 disabled:opacity-50"
                  x-text="$t('chat.send')"></button>
        </div>
      </div>
    </div>

    <!-- Placeholder for pages not yet implemented -->
    <div x-show="!['status','models','settings','logs','benchmark','chat'].includes(currentPage)">
      <p class="text-gray-500">Page not found.</p>
    </div>
  </main>

  <script src="/admin/static/i18n.js"></script>
  <script src="/admin/static/app.js"></script>
</body>
</html>
